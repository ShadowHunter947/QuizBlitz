<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{background:#0A0A0F;font-family:'Outfit',sans-serif;color:#F5F5F5;overscroll-behavior:none}
button{font-family:'Outfit',sans-serif;outline:none}
::-webkit-scrollbar{width:0;display:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-30px) scale(.8)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes streakPop{0%{transform:scale(0) rotate(-10deg);opacity:0}60%{transform:scale(1.2) rotate(3deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes timerPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,59,48,.4)}50%{box-shadow:0 0 0 8px rgba(255,59,48,0)}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(400px) rotate(720deg);opacity:0}}
@keyframes countIn{0%{transform:scale(3);opacity:0}50%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes glowPulse{0%,100%{opacity:.4}50%{opacity:.8}}
@keyframes levelUp{0%{transform:scale(.5) rotate(-5deg);opacity:0}50%{transform:scale(1.15) rotate(2deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes xpFill{from{width:0}}
@keyframes unlockGlow{0%,100%{box-shadow:0 0 20px rgba(255,215,0,.3)}50%{box-shadow:0 0 40px rgba(255,215,0,.6)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes orbit{0%{transform:rotate(0deg) translateX(var(--r)) rotate(0deg)}100%{transform:rotate(360deg) translateX(var(--r)) rotate(-360deg)}}
@keyframes drift{0%{transform:translate(0,0)}25%{transform:translate(10px,-15px)}50%{transform:translate(-5px,-25px)}75%{transform:translate(-15px,-10px)}100%{transform:translate(0,0)}}
@keyframes binaryFall{0%{transform:translateY(-20px);opacity:0}10%{opacity:.8}90%{opacity:.8}100%{transform:translateY(calc(100vh + 20px));opacity:0}}
@keyframes sparkle{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.3)}}
@keyframes sandDrift{0%{transform:translateX(0) translateY(0);opacity:.7}100%{transform:translateX(60px) translateY(-30px);opacity:0}}
@keyframes waveBob{0%,100%{transform:translateY(0) scaleY(1)}50%{transform:translateY(-8px) scaleY(1.08)}}
@keyframes filmRoll{0%{transform:translateY(0)}100%{transform:translateY(-200px)}}
@keyframes circuitPulse{0%,100%{opacity:.15}50%{opacity:.5}}
@keyframes nebula{0%{transform:scale(1) rotate(0deg);opacity:.3}50%{transform:scale(1.3) rotate(5deg);opacity:.5}100%{transform:scale(1) rotate(0deg);opacity:.3}}
@keyframes aurora{0%{transform:translateX(-10%) skewX(-5deg);opacity:.4}50%{transform:translateX(10%) skewX(5deg);opacity:.6}100%{transform:translateX(-10%) skewX(-5deg);opacity:.4}}
@keyframes torchFlicker{0%,100%{opacity:.6;transform:scaleY(1)}25%{opacity:.8;transform:scaleY(1.1)}50%{opacity:.5;transform:scaleY(.95)}75%{opacity:.9;transform:scaleY(1.05)}}
@keyframes neonPulse{0%,100%{filter:brightness(1) blur(0px);opacity:.5}50%{filter:brightness(1.5) blur(1px);opacity:.8}}
@keyframes dataStream{0%{transform:translateY(-100%);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(100vh);opacity:0}}
@keyframes compassSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes starTwinkle{0%,100%{opacity:.1;transform:scale(.5)}50%{opacity:1;transform:scale(1.2)}}
@keyframes waveFlow{0%{d:path('M0,50 Q100,20 200,50 T400,50')}50%{d:path('M0,50 Q100,80 200,50 T400,50')}100%{d:path('M0,50 Q100,20 200,50 T400,50')}}
@keyframes diceRoll{0%{transform:rotate(0deg) scale(1)}25%{transform:rotate(90deg) scale(1.15)}50%{transform:rotate(180deg) scale(1)}75%{transform:rotate(270deg) scale(1.15)}100%{transform:rotate(360deg) scale(1)}}
@keyframes tokenBounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-6px) scale(1.2)}}
@keyframes triviaReveal{0%{opacity:0;transform:scale(.85) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes coinPop{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.2) rotate(5deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
</style>

<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-type="module">
const {useState,useEffect,useCallback,useRef,useMemo}=React;

// ═══════════════════════════════════════
// SOUND ENGINE — Web Audio API (no files!)
// ═══════════════════════════════════════
class SoundEngine {
  constructor(){this.ctx=null;this.enabled=true;this.volume=0.5;}
  init(){
    if(this.ctx)return;
    try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();
    if(this.ctx.state==='suspended')this.ctx.resume();}catch(e){this.enabled=false;}
  }
  gain(v=this.volume){const g=this.ctx.createGain();g.gain.value=v;g.connect(this.ctx.destination);return g;}
  osc(type,freq,dur,vol=this.volume,detune=0){
    if(!this.ctx||!this.enabled)return;
    const o=this.ctx.createOscillator();const g=this.gain(vol);
    o.type=type;o.frequency.value=freq;o.detune.value=detune;o.connect(g);
    g.gain.setValueAtTime(vol,this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+dur);
    o.start();o.stop(this.ctx.currentTime+dur);
  }
  noise(dur,vol=0.1){
    if(!this.ctx||!this.enabled)return;
    const buf=this.ctx.createBuffer(1,this.ctx.sampleRate*dur,this.ctx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    const src=this.ctx.createBufferSource();src.buffer=buf;
    const g=this.gain(vol);const f=this.ctx.createBiquadFilter();
    f.type='bandpass';f.frequency.value=1000;f.Q.value=0.5;
    src.connect(f);f.connect(g);src.start();src.stop(this.ctx.currentTime+dur);
  }
  click(){this.osc('sine',800,0.06,0.15);this.osc('sine',1200,0.04,0.08);}
  hover(){this.osc('sine',600,0.03,0.05);}
  correct(){
    const t=this.ctx?.currentTime;if(!t)return;
    [523,659,784].forEach((f,i)=>{setTimeout(()=>this.osc('sine',f,0.15,0.25),i*80);});
    this.osc('triangle',1047,0.3,0.1);
  }
  wrong(){this.osc('sawtooth',200,0.3,0.15);this.osc('square',150,0.2,0.1);this.noise(0.15,0.08);}
  streak(n){
    const base=440+n*40;
    [0,50,100].forEach((d,i)=>{setTimeout(()=>{this.osc('sine',base+i*100,0.12,0.2);this.osc('triangle',base+i*150,0.1,0.1);},d);});
  }
  tick(){this.osc('sine',1000,0.03,0.1);this.osc('triangle',2000,0.02,0.05);}
  countdown(n){
    if(n>0){this.osc('sine',880,0.1,0.2);this.osc('triangle',440,0.08,0.1);}
    else{[523,659,784,1047].forEach((f,i)=>{setTimeout(()=>this.osc('sine',f,0.2,0.3),i*60);});}
  }
  levelUp(){
    [262,330,392,523,659,784].forEach((f,i)=>{
      setTimeout(()=>{this.osc('sine',f,0.25,0.25);this.osc('triangle',f*2,0.15,0.08);},i*100);
    });
    setTimeout(()=>this.osc('sine',1047,0.6,0.2),650);
  }
  gameOver(good){
    if(good){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>this.osc('sine',f,0.3,0.2),i*120));}
    else{[392,349,330,262].forEach((f,i)=>setTimeout(()=>this.osc('sine',f,0.25,0.15),i*150));}
  }
  themeSelect(){this.osc('sine',523,0.08,0.15);setTimeout(()=>this.osc('sine',784,0.12,0.2),80);}
  timerWarning(){this.osc('square',440,0.08,0.12);this.osc('sine',880,0.05,0.08);}
  multiplier(){[660,880,1100].forEach((f,i)=>setTimeout(()=>this.osc('triangle',f,0.1,0.15),i*50));}
  diceRoll(){[200,300,400,350].forEach((f,i)=>setTimeout(()=>this.osc('square',f,0.05,0.08),i*60));}
  snakeBite(){this.osc('sawtooth',150,0.4,0.15);setTimeout(()=>this.osc('sine',100,0.3,0.1),200);}
  ladderClimb(){[330,440,550,660].forEach((f,i)=>setTimeout(()=>this.osc('sine',f,0.1,0.18),i*80));}
  coinEarn(){this.osc('sine',880,0.08,0.2);setTimeout(()=>this.osc('triangle',1100,0.1,0.15),80);}
  triviaUnlock(){[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>this.osc('sine',f,0.2,0.25),i*90));}
  ambientPing(cat){
    const tones={Science:[523,659,784],History:[330,392,440],"Geography":[440,523,659],"Pop Culture":[587,740,880],Tech:[660,880,1100]};
    const t=tones[cat]||tones.Science;
    this.osc('sine',t[Math.floor(Math.random()*3)],0.4,0.03);
  }
}
const sfx=new SoundEngine();

// ═══════════════════════════════════════
// ANIMATED BACKGROUNDS per CATEGORY
// ═══════════════════════════════════════
const CenterVignette=({bg})=><div style={{position:'absolute',inset:0,
  background:`radial-gradient(ellipse at 50% 45%,${bg}EE 0%,${bg}CC 30%,${bg}66 60%,transparent 85%)`,
  pointerEvents:'none',zIndex:2}}/>;

const ScienceBg=({color,bg})=>{
  const particles=useMemo(()=>Array.from({length:30},(_,i)=>({
    x:Math.random()*100,y:Math.random()*100,size:2+Math.random()*5,
    dur:3+Math.random()*6,delay:Math.random()*5,hue:Math.random()>.5?0:120,
  })),[]);
  const molecules=useMemo(()=>Array.from({length:5},(_,i)=>({
    x:5+Math.random()*90,y:5+Math.random()*90,size:60+Math.random()*80,
    dur:10+Math.random()*10,delay:i*2,
  })),[]);
  return <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none'}}>
    <div style={{position:'absolute',top:'-10%',left:'-5%',width:'45%',height:'45%',
      background:'radial-gradient(circle,#00E5A033 0%,#00E5A011 40%,transparent 70%)',
      animation:'nebula 12s ease-in-out infinite',borderRadius:'50%'}}/>
    <div style={{position:'absolute',bottom:'-5%',right:'-5%',width:'50%',height:'50%',
      background:'radial-gradient(circle,#00B4D833 0%,#00B4D811 40%,transparent 70%)',
      animation:'nebula 15s ease-in-out 3s infinite',borderRadius:'50%'}}/>
    <div style={{position:'absolute',top:'30%',right:'0%',width:'35%',height:'35%',
      background:'radial-gradient(circle,#7B68EE22 0%,transparent 60%)',
      animation:'nebula 10s ease-in-out 6s infinite',borderRadius:'50%'}}/>
    {molecules.map((m,i)=><div key={i} style={{position:'absolute',left:m.x+'%',top:m.y+'%',width:m.size,height:m.size,animation:`drift ${m.dur}s ease-in-out ${m.delay}s infinite`}}>
      <svg width={m.size} height={m.size} viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="4" fill={color} opacity="0.5"><animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/></circle>
        <circle cx="50" cy="50" r="20" fill="none" stroke={color} strokeWidth="0.5" opacity="0.2"/>
        <circle cx="50" cy="50" r="35" fill="none" stroke={color} strokeWidth="0.3" opacity="0.12"/>
        {[0,60,120,180,240,300].map((angle,j)=>{const rad=angle*Math.PI/180;const r2=20;const cx2=50+Math.cos(rad)*r2;const cy2=50+Math.sin(rad)*r2;
          return <g key={j}><line x1="50" y1="50" x2={cx2} y2={cy2} stroke={color} strokeWidth="0.5" opacity="0.2"/>
            <circle cx={cx2} cy={cy2} r="2" fill={color} opacity="0.4"><animate attributeName="opacity" values="0.2;0.6;0.2" dur={1.5+j*0.3+'s'} repeatCount="indefinite"/></circle></g>;
        })}
        <circle cx="30" cy="30" r="2" fill="#00E5A0" opacity="0.6">
          <animateTransform attributeName="transform" type="rotate" values="0 50 50;360 50 50" dur={4+i+'s'} repeatCount="indefinite"/>
        </circle>
      </svg>
    </div>)}
    <svg width="80" height="500" style={{position:'absolute',left:'2%',top:'5%',opacity:0.25}}>
      {Array.from({length:25},(_,i)=>{const y=i*20;const phase=i*0.7;const x1=20+Math.sin(phase)*18;const x2=60-Math.sin(phase)*18;const colors=['#00E5A0','#00B4D8','#A78BFA'];
        return <g key={i}><circle cx={x1} cy={y} r="3" fill={colors[i%3]} opacity="0.7"><animate attributeName="opacity" values="0.4;0.9;0.4" dur={2+i*0.2+'s'} repeatCount="indefinite"/></circle>
          <circle cx={x2} cy={y} r="3" fill={colors[(i+1)%3]} opacity="0.7"><animate attributeName="opacity" values="0.4;0.9;0.4" dur={2.5+i*0.2+'s'} repeatCount="indefinite"/></circle>
          {i%2===0&&<line x1={x1} y1={y} x2={x2} y2={y} stroke="white" strokeWidth="0.6" opacity="0.15"/>}</g>;})}
    </svg>
    {particles.map((p,i)=><div key={i} style={{position:'absolute',left:p.x+'%',top:p.y+'%',width:p.size,height:p.size,borderRadius:'50%',
      background:p.hue===0?color:'#00B4D8',boxShadow:`0 0 ${p.size*2}px ${p.hue===0?color:'#00B4D8'}44`,
      animation:`sparkle ${p.dur}s ease ${p.delay}s infinite`}}/>)}
    <CenterVignette bg={bg}/>
  </div>;
};

const HistoryBg=({color,bg})=>{
  const embers=useMemo(()=>Array.from({length:25},()=>({x:Math.random()*100,size:1.5+Math.random()*3,dur:3+Math.random()*5,delay:Math.random()*6})),[]);
  const stars=useMemo(()=>Array.from({length:20},()=>({x:Math.random()*100,y:Math.random()*40,size:1+Math.random()*2,dur:2+Math.random()*4,delay:Math.random()*3})),[]);
  return <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none'}}>
    <div style={{position:'absolute',top:0,left:0,right:0,height:'50%',background:'linear-gradient(180deg,#FF6B6B15 0%,#FFB34718 20%,#FF8C0010 40%,transparent 100%)'}}/>
    {stars.map((s,i)=><div key={i} style={{position:'absolute',left:s.x+'%',top:s.y+'%',width:s.size,height:s.size,borderRadius:'50%',background:'#FFE4B5',boxShadow:`0 0 ${s.size*3}px #FFE4B566`,animation:`starTwinkle ${s.dur}s ease ${s.delay}s infinite`}}/>)}
    <svg width="100%" height="100%" viewBox="0 0 500 350" preserveAspectRatio="xMidYMax meet" style={{position:'absolute',bottom:0}}>
      <defs>
        <linearGradient id="pyrFace1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#FFD700" stopOpacity="0.35"/><stop offset="100%" stopColor="#FF8C00" stopOpacity="0.15"/></linearGradient>
        <linearGradient id="pyrFace2" x1="100%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stopColor="#FFB347" stopOpacity="0.2"/><stop offset="100%" stopColor="#8B4513" stopOpacity="0.15"/></linearGradient>
      </defs>
      <polygon points="200,100 310,300 90,300" fill="url(#pyrFace1)" stroke="#FFD70033" strokeWidth="0.5"/>
      <polygon points="200,100 310,300 200,300" fill="url(#pyrFace2)"/>
      <polygon points="350,160 440,300 260,300" fill="url(#pyrFace1)" opacity="0.7" stroke="#FFD70022" strokeWidth="0.5"/>
      <polygon points="350,160 440,300 350,300" fill="url(#pyrFace2)" opacity="0.7"/>
      <polygon points="80,220 130,300 30,300" fill="url(#pyrFace1)" opacity="0.5"/>
      <rect x="0" y="298" width="500" height="52" fill="#D2691E" opacity="0.08"/>
    </svg>
    <div style={{position:'absolute',left:'6%',bottom:'28%'}}><div style={{width:8,height:20,background:'linear-gradient(0deg,#FF450066,#FFD70088,#FF8C0044,transparent)',borderRadius:'50% 50% 20% 20%',animation:'torchFlicker 1.5s ease infinite',boxShadow:'0 0 15px #FF8C0055, 0 0 30px #FF450033'}}/><div style={{width:4,height:12,background:'#8B4513',margin:'0 auto',borderRadius:2,opacity:0.3}}/></div>
    <div style={{position:'absolute',right:'6%',bottom:'25%'}}><div style={{width:8,height:22,background:'linear-gradient(0deg,#FF450066,#FFD70088,#FF8C0044,transparent)',borderRadius:'50% 50% 20% 20%',animation:'torchFlicker 1.8s ease 0.5s infinite',boxShadow:'0 0 15px #FF8C0055, 0 0 30px #FF450033'}}/><div style={{width:4,height:12,background:'#8B4513',margin:'0 auto',borderRadius:2,opacity:0.3}}/></div>
    {embers.map((e,i)=><div key={i} style={{position:'absolute',left:e.x+'%',bottom:'-5%',width:e.size,height:e.size,borderRadius:'50%',background:i%3===0?'#FF6B6B':i%3===1?'#FFD700':'#FF8C00',boxShadow:`0 0 ${e.size*3}px ${i%3===0?'#FF6B6B':'#FFD700'}44`,animation:`sandDrift ${e.dur}s ease ${e.delay}s infinite`}}/>)}
    <div style={{position:'absolute',left:'3%',top:'12%',fontSize:32,opacity:0.08,color:'#FFD700',animation:'float 8s ease-in-out infinite'}}>𓂀</div>
    <div style={{position:'absolute',right:'5%',top:'20%',fontSize:26,opacity:0.07,color:'#FFB347',animation:'float 10s ease-in-out 2s infinite'}}>𓃭</div>
    <CenterVignette bg={bg}/>
  </div>;
};

const GeographyBg=({color,bg})=>{
  const pins=useMemo(()=>Array.from({length:10},()=>({x:5+Math.random()*90,y:5+Math.random()*90,dur:3+Math.random()*4,delay:Math.random()*4})),[]);
  const waves=useMemo(()=>Array.from({length:4},(_,i)=>({y:75+i*6,dur:3+i*0.8,delay:i*0.5})),[]);
  return <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none'}}>
    <div style={{position:'absolute',top:0,left:0,right:0,height:'35%',overflow:'hidden'}}>
      <div style={{position:'absolute',top:'-20%',left:'-10%',width:'60%',height:'150%',background:'linear-gradient(135deg,#4ECDC433,#00B4D822,transparent)',borderRadius:'50%',animation:'aurora 8s ease-in-out infinite'}}/>
      <div style={{position:'absolute',top:'-10%',right:'-15%',width:'55%',height:'130%',background:'linear-gradient(225deg,#34D39933,#4ECDC422,transparent)',borderRadius:'50%',animation:'aurora 10s ease-in-out 2s infinite'}}/>
      <div style={{position:'absolute',top:'0%',left:'20%',width:'40%',height:'100%',background:'linear-gradient(180deg,#00E5A022,transparent)',borderRadius:'50%',animation:'aurora 12s ease-in-out 4s infinite'}}/>
    </div>
    <svg width="350" height="350" viewBox="0 0 200 200" style={{position:'absolute',right:'-8%',top:'8%',opacity:0.12}}>
      <defs><linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#4ECDC4"/><stop offset="100%" stopColor="#00B4D8"/></linearGradient></defs>
      <circle cx="100" cy="100" r="80" fill="none" stroke="url(#globeGrad)" strokeWidth="1.2"/>
      <ellipse cx="100" cy="100" rx="80" ry="30" fill="none" stroke={color} strokeWidth="0.6" opacity="0.8"/>
      <ellipse cx="100" cy="100" rx="80" ry="55" fill="none" stroke={color} strokeWidth="0.5" opacity="0.6"/>
      <ellipse cx="100" cy="100" rx="30" ry="80" fill="none" stroke={color} strokeWidth="0.6" opacity="0.8"/>
      <ellipse cx="100" cy="100" rx="55" ry="80" fill="none" stroke={color} strokeWidth="0.5" opacity="0.6"/>
      <animateTransform attributeName="transform" type="rotate" values="0 100 100;360 100 100" dur="50s" repeatCount="indefinite"/>
    </svg>
    {pins.map((p,i)=><div key={i} style={{position:'absolute',left:p.x+'%',top:p.y+'%',animation:`sparkle ${p.dur}s ease ${p.delay}s infinite`}}>
      <svg width="16" height="22" viewBox="0 0 12 16"><path d="M6 0C2.7 0 0 2.7 0 6c0 4.5 6 10 6 10s6-5.5 6-10C12 2.7 9.3 0 6 0z" fill={i%3===0?'#4ECDC4':i%3===1?'#00B4D8':'#34D399'} opacity="0.35"/><circle cx="6" cy="6" r="2" fill="white" opacity="0.5"/></svg>

const TechBg=({color,bg})=>{
  const binaryStreams=useMemo(()=>Array.from({length:15},(_,i)=>({x:3+Math.random()*94,chars:Array.from({length:8},()=>Math.random()>.5?'1':'0').join(''),dur:4+Math.random()*8,delay:Math.random()*6,size:10+Math.random()*4,color:['#7B68EE','#00E5FF','#E040FB','#00E5A0'][Math.floor(Math.random()*4)]})),[]);
  const nodes=useMemo(()=>Array.from({length:8},()=>({x:5+Math.random()*90,y:5+Math.random()*90})),[]);
  return <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none'}}>

        return <g key={i}>

            <animate attributeName="r" values="2;5;2" dur={2+i*0.3+'s'} repeatCount="indefinite"/>

  </div>;
};

const CategoryBg=({category,color,bg})=>{
  switch(category){
    case 'Science':return <ScienceBg color={color} bg={bg}/>;
    case 'History':return <HistoryBg color={color} bg={bg}/>;
    case 'Geography':return <GeographyBg color={color} bg={bg}/>;
    case 'Pop Culture':return <PopCultureBg color={color} bg={bg}/>;
    case 'Tech':return <TechBg color={color} bg={bg}/>;
    default:return <ScienceBg color={color} bg={bg}/>;
  }
};

const SnakeLadderGame=({theme,onClose,onResult,coins})=>{
  const [pPos,setPPos]=useState(0);
  const [aPos,setAPos]=useState(0);
  const [rolling,setRolling]=useState(false);
  const [dice,setDice]=useState(null);
  const [msg,setMsg]=useState("Roll the dice to start! You're 🔵, AI is 🔴");
  const [phase,setPhase]=useState('player');// player | ai | done
  const [winner,setWinner]=useState(null);
  const pRef=useRef(0);const aRef=useRef(0);

  const setP=v=>{pRef.current=v;setPPos(v);};
  const setA=v=>{aRef.current=v;setAPos(v);};

  const boardCells=useMemo(()=>{
    const cells=[];
    for(let dRow=0;dRow<10;dRow++){
      const bRow=9-dRow;
      for(let col=0;col<10;col++){
        const bCol=bRow%2===0?col:9-col;
        const sq=bRow*10+bCol+1;
        cells.push({sq,dRow,col});
      }
    }
    return cells;
  },[]);

  const sqCenter=useCallback(num=>{
    const bRow=Math.floor((num-1)/10);
    const bCol=bRow%2===0?(num-1)%10:9-(num-1)%10;
    const dRow=9-bRow;
    return{x:(bCol+0.5)*10,y:(dRow+0.5)*10};
  },[]);

  const resolveMove=useCallback((cur,roll,isPlayer)=>{
    let next=cur+roll;
    if(next>100)next=cur;
    let note='';
    if(SNAKES[next]!==undefined){note=`🐍 Snake! ${next}→${SNAKES[next]}`;next=SNAKES[next];sfx.snakeBite();}
    else if(LADDERS[next]!==undefined){note=`🪜 Ladder! ${next}→${LADDERS[next]}`;next=LADDERS[next];sfx.ladderClimb();}
    return{next,note};
  },[]);

  const doPlayerTurn=useCallback(()=>{
    if(rolling||phase!=='player')return;
    sfx.init();sfx.diceRoll();
    setRolling(true);setDice('?');
    let flashes=0;
    const iv=setInterval(()=>{
      setDice(['⚀','⚁','⚂','⚃','⚄','⚅'][Math.floor(Math.random()*6)]);
      flashes++;
      if(flashes>=8){
        clearInterval(iv);
        const roll=Math.floor(Math.random()*6)+1;
        const face=['⚀','⚁','⚂','⚃','⚄','⚅'][roll-1];
        setDice(face);
        const{next,note}=resolveMove(pRef.current,roll,true);
        setP(next);
        if(next>=100){setMsg('🎉 You win! 🎉');setPhase('done');setWinner('player');setRolling(false);return;}
        setMsg(note||`You rolled ${roll}! Moved to square ${next}.`);
        setRolling(false);setPhase('ai');
        setTimeout(()=>doAiTurn(),1200);
      }
    },80);
  },[rolling,phase,resolveMove]);

    sfx.diceRoll();
    const roll=Math.floor(Math.random()*6)+1;
    const face=['⚀','⚁','⚂','⚃','⚄','⚅'][roll-1];
    setTimeout(()=>{
      setDice(face);
      const{next,note}=resolveMove(aRef.current,roll,false);
      setA(next);
      if(next>=100){setMsg('🔴 AI wins! Better luck next time.');setPhase('done');setWinner('ai');return;}
      setMsg((note?note+' ':'')+`AI rolled ${roll}, at square ${next}. Your turn!`);
      setPhase('player');
    },600);
  },[resolveMove]);

            {boardCells.map(({sq,dRow,col})=>{

                {isSnakeHead&&<div style={{fontSize:9,opacity:0.6}}>🐍</div>}
                {isLadderBot&&<div style={{fontSize:9,opacity:0.6}}>🪜</div>}
                {hasPl&&<div style={{fontSize:hasPl&&hasAi?10:13,animation:'tokenBounce 1s ease infinite',lineHeight:1}}>🔵</div>}
                {hasAi&&<div style={{fontSize:hasPl&&hasAi?10:13,animation:'tokenBounce 1.2s ease .3s infinite',lineHeight:1}}>🔴</div>}
              </div>;
            })}
          </div>
        </div>

        <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center'}}>
          <div style={{flex:1,background:theme.cardBg,borderRadius:10,padding:'8px 12px',border:`1px solid ${theme.border}`,textAlign:'center'}}>
            <div style={{fontSize:11,color:theme.textSecondary}}>🔵 You</div>
            <div style={{fontSize:18,fontWeight:800,color:theme.accent}}>Sq {pPos||'—'}</div>
          </div>
          <div style={{fontSize:28}}>{dice||'🎲'}</div>
          <div style={{flex:1,background:theme.cardBg,borderRadius:10,padding:'8px 12px',border:`1px solid ${theme.border}`,textAlign:'center'}}>
            <div style={{fontSize:11,color:theme.textSecondary}}>🔴 AI</div>
            <div style={{fontSize:18,fontWeight:800,color:'#FF6B6B'}}>Sq {aPos||'—'}</div>
          </div>
        </div>

        {phase==='done'?(
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <div style={{background:winner==='player'?theme.accent+'15':'#FF444415',border:`1px solid ${winner==='player'?theme.accent+'44':'#FF444444'}`,borderRadius:12,padding:'14px',textAlign:'center'}}>
              <div style={{fontFamily:"'Dela Gothic One',cursive",fontSize:22,color:winner==='player'?theme.accent:'#FF6B6B',marginBottom:4}}>{winner==='player'?'You Win! 🏆':'AI Wins 🤖'}</div>
              <div style={{fontSize:13,color:theme.textSecondary}}>Reward: <span style={{color:'#FFE66D',fontWeight:700}}>{winner==='player'?`+${Math.floor(100+Math.random()*100)} 🪙`:'+20 🪙'}</span></div>
            </div>
            <button onClick={()=>onResult(winner)} style={{width:'100%',padding:'14px',background:`linear-gradient(135deg,${theme.accent},${theme.accentAlt})`,border:'none',borderRadius:12,cursor:'pointer',fontSize:15,fontWeight:800,color:theme.bg,fontFamily:"'Outfit',sans-serif"}}>Collect Reward</button>
          </div>
        ):(
          <button onClick={doPlayerTurn} disabled={rolling||phase!=='player'} style={{width:'100%',padding:'16px',background:phase==='player'?`linear-gradient(135deg,${theme.accent},${theme.accentAlt})`:'rgba(255,255,255,.05)',border:'none',borderRadius:12,cursor:phase==='player'?'pointer':'default',fontSize:16,fontWeight:800,color:phase==='player'?theme.bg:theme.textSecondary,transition:'all .2s',fontFamily:"'Outfit',sans-serif",opacity:rolling?0.7:1}}>
            {rolling?'Rolling...':(phase==='player'?'🎲 Roll Dice':'⏳ AI Rolling...')}
          </button>
        )}
      </div>
    </div>
  );
};

// ═══════════════════════════════════════
// MAIN APP COMPONENT
// ═══════════════════════════════════════
function App(){
  const sv=load();
  const[screen,setScreen]=useState("menu");
  const[cat,setCat]=useState(null);
  const[qs,setQs]=useState([]);
  const[qi,setQi]=useState(0);
  const[score,setScore]=useState(0);
  const[stk,setStk]=useState(0);
  const[bstk,setBstk]=useState(0);
  const[tl,setTl]=useState(12);
  const[sel,setSel]=useState(null);
  const[sr,setSr]=useState(false);
  const[cor,setCor]=useState(0);
  const[cd,setCd]=useState(3);
  const[hs,setHs]=useState(sv?.hs||0);
  const[tp,setTp]=useState(sv?.tp||0);
  const[mult,setMult]=useState(1);
  const[pp,setPp]=useState(null);
  const[ah,setAh]=useState([]);
  const[tid,setTid]=useState(sv?.tid||"midnight");
  const[lvl,setLvl]=useState(sv?.lvl||1);
  const[xp,setXp]=useState(sv?.xp||0);
  const[xpg,setXpg]=useState(0);
  const[slu,setSlu]=useState(false);
  const[nu,setNu]=useState([]);
  const[shop,setShop]=useState(false);
  const[soundOn,setSoundOn]=useState(sv?.soundOn!==false);
  // V3 new state
  const[coins,setCoins]=useState(sv?.coins||0);
  const[unlockedThemes,setUnlockedThemes]=useState(sv?.unlockedThemes||[]);
  const[slWins,setSlWins]=useState(sv?.slWins||0);
  const[slLosses,setSlLosses]=useState(sv?.slLosses||0);
  const[showTrivia,setShowTrivia]=useState(false);
  const[triviaContent,setTriviaContent]=useState(null);
  const[triviaCat,setTriviaCat]=useState(null);
  const[triviaXp,setTriviaXp]=useState(0);
  const[triviaCoins,setTriviaCoins]=useState(0);
  const[showSnakeLadder,setShowSnakeLadder]=useState(false);
  const[slCooldown,setSlCooldown]=useState(()=>{
    const last=parseInt(localStorage.getItem('sl_last')||'0');
    const rem=COOLDOWN_MS-(Date.now()-last);
    return rem>0?rem:0;
  });
  const tr=useRef(null);const pr=useRef(null);const ambRef=useRef(null);

  const theme=THEMES.find(t=>t.id===tid)||THEMES[0];

  // Progressive difficulty
  const getPool=useCallback(c=>{
    const easy=QE[c]||[];const hard=QH[c]||[];
    if(lvl>=30)return[...hard];
    if(lvl>=20)return[...easy,...hard];
    if(lvl>=10)return[...easy,...hard.slice(0,5)];
    return easy;
  },[lvl]);
  const tpq=lvl>=30?8:lvl>=20?10:12;

  // Save
  useEffect(()=>{save({hs,tp,tid,lvl,xp,soundOn,coins,unlockedThemes,slWins,slLosses})},[hs,tp,tid,lvl,xp,soundOn,coins,unlockedThemes,slWins,slLosses]);
  useEffect(()=>{document.body.style.background=theme.bg},[theme]);
  useEffect(()=>{sfx.enabled=soundOn},[soundOn]);

  // Cooldown timer
  useEffect(()=>{
    if(slCooldown<=0)return;
    const iv=setInterval(()=>setSlCooldown(p=>{if(p<=1000){clearInterval(iv);return 0;}return p-1000;}),1000);
    return()=>clearInterval(iv);
  },[slCooldown]);

  // Ambient ping during game
  useEffect(()=>{
    if(screen==='game'&&cat&&cat!=='Mixed'){
      ambRef.current=setInterval(()=>sfx.ambientPing(cat),4000+Math.random()*3000);
      return()=>clearInterval(ambRef.current);
    }else{clearInterval(ambRef.current);}
  },[screen,cat]);

  const addCoins=useCallback(n=>{setCoins(p=>p+n);sfx.coinEarn();},[]);

  const addXp=useCallback(amt=>{
    setXp(prev=>{
      let nx=prev+amt,nl=lvl,ul=[];
      while(nx>=xpFor(nl)){nx-=xpFor(nl);nl++;const u=THEMES.filter(t=>t.unlockLevel===nl&&!t.free);ul=[...ul,...u];}
      if(nl>lvl){setLvl(nl);setSlu(true);sfx.levelUp();if(ul.length)setNu(ul);setTimeout(()=>{setSlu(false);setNu([])},3500);}
      return nx;
    });
  },[lvl]);

  const startGame=useCallback(c=>{
    sfx.init();sfx.click();
    const isM=c==="Mixed";
    const pool=isM?CATS.flatMap(x=>getPool(x)).sort(()=>Math.random()-.5).slice(0,QPR):getPool(c).sort(()=>Math.random()-.5).slice(0,QPR);
    setCat(c);setQs(pool);setQi(0);setScore(0);setStk(0);setBstk(0);
    setCor(0);setSel(null);setSr(false);setMult(1);setAh([]);
    setCd(3);setScreen("countdown");setXpg(0);
  },[getPool]);

  useEffect(()=>{
    if(screen!=="countdown")return;
    if(cd<=0){sfx.countdown(0);setScreen("game");setTl(tpq);return;}
    sfx.countdown(cd);
    const t=setTimeout(()=>setCd(c=>c-1),700);
    return()=>clearTimeout(t);
  },[screen,cd,tpq]);

  useEffect(()=>{
    if(screen!=="game"||sr)return;
    if(tl<=0){handleAns(-1);return;}
    if(tl<=3)sfx.timerWarning();
    tr.current=setTimeout(()=>setTl(t=>t-1),1000);
    return()=>clearTimeout(tr.current);
  },[screen,tl,sr]);

  const handleAns=idx=>{
    if(sr)return;
    clearTimeout(tr.current);
    setSel(idx);setSr(true);
    const ok=idx===qs[qi].a;
    setAh(p=>[...p,ok]);
    const hard=lvl>=20;
    let ep=0;
    if(ok){
      sfx.correct();
      const ns=stk+1;setStk(ns);if(ns>bstk)setBstk(ns);
      const nm=ns>=5?3:ns>=3?2:1;setMult(nm);
      if(nm>1&&(ns===3||ns===5))sfx.multiplier();
      if(ns>1)sfx.streak(ns);
      const tb=Math.max(0,tl*5);ep=(100+tb)*nm;
      setScore(s=>s+ep);setCor(c=>c+1);
      const exn=10+(hard?5:0)+(nm>1?5:0);setXpg(p=>p+exn);
      setPp({pts:ep,mult:nm});
      clearTimeout(pr.current);pr.current=setTimeout(()=>setPp(null),1200);
    }else{sfx.wrong();setStk(0);setMult(1);}

    setTimeout(()=>{
      const finalCor=cor+(ok?1:0);
      if(qi+1>=qs.length){
        const fs=score+ep;if(fs>hs)setHs(fs);
        setTp(t=>t+1);
        const xpEarned=xpg+(ok?10+(hard?5:0):0);
        addXp(xpEarned);
        sfx.gameOver(finalCor>=7);
        // Perfect 10 reward
        if(finalCor===QPR&&cat!=='Mixed'){
          const pool=TRIVIA_DATA[cat];
          const article=pool[Math.floor(Math.random()*pool.length)];
          const bxp=lvl*20;const bc=50;
          setTriviaContent(article);setTriviaCat(cat);setTriviaXp(bxp);setTriviaCoins(bc);
          addXp(bxp);addCoins(bc);sfx.triviaUnlock();
          setTimeout(()=>setShowTrivia(true),800);
        }
        setScreen("result");
      }else{setQi(i=>i+1);setSel(null);setSr(false);setTl(tpq);}
    },1400);
  };

  const handleSlResult=winner=>{
    localStorage.setItem('sl_last',Date.now().toString());
    setSlCooldown(COOLDOWN_MS);
    if(winner==='player'){
      const reward=100+Math.floor(Math.random()*101);
      addCoins(reward);setSlWins(w=>w+1);
    }else{addCoins(20);setSlLosses(l=>l+1);}
    setShowSnakeLadder(false);
  };

  const cQ=qs[qi];
  const catCol=cat&&CC[cat]?CC[cat]:theme.accent;
  const xpN=xpFor(lvl);const xpP=Math.min((xp/xpN)*100,100);
  const lt=TITLES[Math.min(lvl-1,TITLES.length-1)];
  const hard=lvl>=20;
  const fmtCd=ms=>{const m=Math.floor(ms/60000);const s=Math.floor((ms%60000)/1000);return`${m}:${s.toString().padStart(2,'0')}`;};

  const Btn=({children,onClick,style:s,...p})=><button onClick={e=>{sfx.init();sfx.click();onClick?.(e)}} {...p} style={{...s,fontFamily:"'Outfit',sans-serif"}}>{children}</button>;
  const SoundToggle=()=><button onClick={()=>{sfx.init();setSoundOn(p=>!p);sfx.click()}} style={{position:'fixed',top:16,right:16,zIndex:90,background:theme.cardBg,border:`1px solid ${theme.border}`,borderRadius:10,width:40,height:40,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,transition:'all .2s',fontFamily:"'Outfit',sans-serif"}}>{soundOn?'🔊':'🔇'}</button>;

  // ─── THEME SHOP ───
  const ThemeShop=()=>(
    <div style={{paddingTop:32,animation:"fadeUp .5s ease"}}>
      <div style={{display:"flex",alignItems:"center",marginBottom:28}}>
        <Btn onClick={()=>setShop(false)} style={{background:"none",border:"none",color:theme.textSecondary,cursor:"pointer",fontSize:14,padding:"8px 0"}}>← Back</Btn>
        <h2 style={{fontFamily:"'Dela Gothic One',cursive",fontSize:22,color:theme.textPrimary,margin:"0 auto",paddingRight:40}}>Themes</h2>
      </div>
      <div style={{background:theme.cardBg,borderRadius:14,padding:"12px 16px",marginBottom:16,border:`1px solid ${theme.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",background:theme.accent+"18",fontSize:16}}>{theme.emoji}</div>
          <div><div style={{fontSize:13,fontWeight:700,color:theme.textPrimary}}>{theme.name}</div><div style={{fontSize:11,color:theme.textSecondary}}>Level {lvl} — {lt}</div></div>
        </div>
        <div style={{textAlign:'right'}}><div style={{fontSize:14,fontWeight:800,color:'#FFE66D'}}>{coins} 🪙</div><div style={{fontSize:10,color:theme.textSecondary}}>coins</div></div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {THEMES.map((t,i)=>{
          const lvlUnlocked=t.free||lvl>=t.unlockLevel;
          const coinUnlocked=unlockedThemes.includes(t.id);
          const unlocked=lvlUnlocked||coinUnlocked;
          const price=THEME_PRICES[t.id];
          const canBuy=price&&!lvlUnlocked&&!coinUnlocked&&coins>=price;
          const ac=t.id===tid;
          return <Btn key={t.id} onClick={()=>{
            if(unlocked){setTid(t.id);sfx.themeSelect();}
            else if(canBuy){setCoins(c=>c-price);setUnlockedThemes(p=>[...p,t.id]);setTid(t.id);sfx.themeSelect();sfx.coinEarn();}
          }} style={{background:ac?t.accent+"12":theme.cardBg,border:`1.5px solid ${ac?t.accent+"55":theme.border}`,borderRadius:14,padding:"14px 16px",cursor:(unlocked||canBuy)?"pointer":"default",display:"flex",alignItems:"center",gap:12,width:"100%",textAlign:"left",opacity:(!unlocked&&!canBuy)?.45:1,transition:"all .2s",animation:`fadeUp .4s ease ${i*.04}s both`}}>
            <div style={{width:44,height:44,borderRadius:12,background:t.preview,border:`2px solid ${t.accent}33`,flexShrink:0,position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",bottom:3,right:3,fontSize:14}}>{t.emoji}</div></div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:700,color:unlocked?theme.textPrimary:theme.textSecondary}}>{t.name}{ac&&<span style={{marginLeft:8,fontSize:10,color:t.accent}}>ACTIVE</span>}</div>
              <div style={{fontSize:11,color:theme.textSecondary,marginTop:2}}>{t.free?"Free":lvlUnlocked||coinUnlocked?"✓ Unlocked":price?`${price} 🪙 or Lv.${t.unlockLevel}`:`🔒 Lv.${t.unlockLevel}`}</div>
            </div>
            {canBuy&&<div style={{fontSize:12,fontWeight:700,color:'#FFE66D',background:'#FFE66D18',borderRadius:8,padding:"4px 10px"}}>BUY</div>}
            {unlocked&&!ac&&<div style={{fontSize:12,fontWeight:700,color:t.accent}}>SELECT</div>}
            {!unlocked&&!canBuy&&price&&<div style={{fontSize:11,color:theme.textSecondary,background:theme.border,borderRadius:8,padding:"4px 8px"}}>{price}🪙</div>}
          </Btn>;
        })}
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:theme.bg,color:theme.textPrimary,fontFamily:"'Outfit',sans-serif",position:"relative",overflow:"hidden"}}>
      <div style={{position:"fixed",inset:0,background:theme.gradient,pointerEvents:"none",animation:"glowPulse 4s ease-in-out infinite"}}/>
      <SoundToggle/>

      {screen==="game"&&cat&&cat!=="Mixed"&&<CategoryBg category={cat} color={catCol} bg={theme.bg}/>}

      {/* Trivia Reward Overlay */}
      {showTrivia&&triviaContent&&<TriviaReward content={triviaContent} cat={triviaCat} onClose={()=>setShowTrivia(false)} theme={theme} catCol={CC[triviaCat]||theme.accent} coinsEarned={triviaCoins} xpEarned={triviaXp}/>}

      {/* Snake & Ladder */}
      {showSnakeLadder&&<SnakeLadderGame theme={theme} onClose={()=>setShowSnakeLadder(false)} onResult={handleSlResult} coins={coins}/>}

      <div style={{maxWidth:460,margin:"0 auto",padding:"0 20px",position:"relative",zIndex:1}}>

      {/* LEVEL UP */}
      {slu&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:100,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <div style={{animation:"levelUp .6s ease",textAlign:"center"}}>
          <div style={{fontSize:16,color:theme.accent,letterSpacing:4,textTransform:"uppercase",marginBottom:8}}>LEVEL UP!</div>
          <div style={{fontFamily:"'Dela Gothic One',cursive",fontSize:72,lineHeight:1,background:`linear-gradient(135deg,${theme.textPrimary},${theme.accent})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{lvl}</div>
          <div style={{fontSize:18,color:theme.textSecondary,marginTop:8,fontWeight:600}}>{lt}</div>
          {lvl===20&&<div style={{marginTop:20,background:"#FF6B6B15",border:"1px solid #FF6B6B33",borderRadius:12,padding:"10px 20px",fontSize:14,color:"#FF6B6B",fontWeight:600}}>⚡ HARD MODE UNLOCKED</div>}
          {lvl===30&&<div style={{marginTop:12,background:"#FF000015",border:"1px solid #FF000033",borderRadius:12,padding:"10px 20px",fontSize:14,color:"#FF6060",fontWeight:600}}>🔥 EXTREME MODE — Hard only, 8s!</div>}
          {nu.map(t=><div key={t.id} style={{marginTop:16,animation:"unlockGlow 1.5s ease infinite",background:t.accent+"15",border:`1px solid ${t.accent}44`,borderRadius:14,padding:"14px 20px",display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:24}}>{t.emoji}</span><div><div style={{fontSize:13,color:"#FFD700",fontWeight:700}}>NEW THEME</div><div style={{fontSize:16,color:theme.textPrimary,fontWeight:700}}>{t.name}</div></div></div>)}
        </div>
      </div>}

      {shop&&screen==="menu"&&<ThemeShop/>}

      {/* ─── MENU ─── */}
      {screen==="menu"&&!shop&&<div style={{paddingTop:40,paddingBottom:40,animation:"fadeUp .6s ease"}}>
        <div style={{textAlign:"center",marginBottom:12}}>
          <div style={{fontSize:13,letterSpacing:6,color:theme.accent,fontWeight:600,textTransform:"uppercase",marginBottom:10}}>⚡ Quiz</div>
          <h1 style={{fontFamily:"'Dela Gothic One',cursive",fontSize:52,margin:0,background:`linear-gradient(135deg,${theme.textPrimary} 30%,${theme.accent} 100%)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1.1}}>BLITZ</h1>
          <div style={{fontSize:11,color:theme.textSecondary,marginTop:6,letterSpacing:2}}>v3.0 — Trivia Rewards & Coins</div>
        </div>

        <div style={{background:theme.cardBg,borderRadius:14,padding:"14px 18px",marginBottom:8,border:`1px solid ${theme.border}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:32,height:32,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",background:theme.accent+"18",fontFamily:"'Dela Gothic One',cursive",fontSize:14,color:theme.accent}}>{lvl}</div>
              <div><div style={{fontSize:13,fontWeight:700,color:theme.textPrimary}}>{lt}</div><div style={{fontSize:11,color:theme.textSecondary}}>Level {lvl}</div></div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:13,fontWeight:800,color:'#FFE66D'}}>{coins} 🪙</div>
              <div style={{fontSize:11,color:theme.textSecondary}}>{xp}/{xpN} XP</div>
            </div>
          </div>
          <div style={{height:6,background:theme.border,borderRadius:3,overflow:"hidden"}}>
            <div style={{width:`${xpP}%`,height:"100%",borderRadius:3,background:`linear-gradient(90deg,${theme.accent},${theme.accentAlt})`,transition:"width .8s"}}/>
          </div>
          {hard&&<div style={{marginTop:8,fontSize:11,color:"#FF6B6B",fontWeight:600}}>⚡ {lvl>=30?'EXTREME':'HARD'} MODE ACTIVE</div>}
        </div>

        <div style={{display:"flex",gap:8,marginBottom:20}}>
          {tp>0&&<div style={{flex:1,display:"flex",justifyContent:"center",gap:20,background:theme.cardBg,borderRadius:12,padding:"12px 16px",border:`1px solid ${theme.border}`}}>
            <div style={{textAlign:"center"}}><div style={{fontSize:17,fontWeight:800,color:theme.accent}}>{hs.toLocaleString()}</div><div style={{fontSize:10,color:theme.textSecondary,textTransform:"uppercase",letterSpacing:1}}>Best</div></div>
            <div style={{width:1,background:theme.border}}/>
            <div style={{textAlign:"center"}}><div style={{fontSize:17,fontWeight:800,color:theme.textPrimary}}>{tp}</div><div style={{fontSize:10,color:theme.textSecondary,textTransform:"uppercase",letterSpacing:1}}>Games</div></div>
            {(slWins+slLosses)>0&&<><div style={{width:1,background:theme.border}}/><div style={{textAlign:"center"}}><div style={{fontSize:17,fontWeight:800,color:'#00E5A0'}}>{slWins}</div><div style={{fontSize:10,color:theme.textSecondary,textTransform:"uppercase",letterSpacing:1}}>S&L W</div></div></>}
          </div>}
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            <Btn onClick={()=>setShop(true)} style={{background:theme.cardBg,border:`1px solid ${theme.border}`,borderRadius:10,padding:"8px 12px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,minWidth:62,transition:"all .2s"}}>
              <span style={{fontSize:18}}>🎨</span><span style={{fontSize:10,color:theme.textSecondary,fontWeight:600}}>Themes</span>
            </Btn>
            <Btn onClick={()=>{if(slCooldown>0)return;sfx.click();setShowSnakeLadder(true);}} style={{background:slCooldown>0?theme.cardBg+'88':`linear-gradient(135deg,${theme.accent}22,${theme.cardBg})`,border:`1px solid ${slCooldown>0?theme.border:theme.accent+'44'}`,borderRadius:10,padding:"6px 10px",cursor:slCooldown>0?"default":"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,minWidth:62,transition:"all .2s",opacity:slCooldown>0?0.6:1}}>
              <span style={{fontSize:16}}>🐍</span>
              <span style={{fontSize:9,color:slCooldown>0?theme.textSecondary:theme.accent,fontWeight:600}}>{slCooldown>0?fmtCd(slCooldown):'Play!'}</span>
            </Btn>
          </div>
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {CATS.map((c,i)=><Btn key={c} onClick={()=>startGame(c)} style={{background:theme.cardBg,border:`1px solid ${theme.border}`,borderRadius:16,padding:"18px 22px",cursor:"pointer",display:"flex",alignItems:"center",gap:16,animation:`fadeUp .5s ease ${.05+i*.06}s both`,transition:"all .25s",width:"100%",textAlign:"left"}}
            onMouseEnter={e=>{sfx.init();sfx.hover();e.currentTarget.style.borderColor=CC[c]+"55";e.currentTarget.style.background=theme.cardHover;e.currentTarget.style.transform="translateX(4px)";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=theme.border;e.currentTarget.style.background=theme.cardBg;e.currentTarget.style.transform="translateX(0)";}}>
            <div style={{width:48,height:48,borderRadius:14,fontSize:22,background:CC[c]+"12",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{CI[c]}</div>
            <div style={{flex:1}}><div style={{fontSize:16,fontWeight:700,color:theme.textPrimary}}>{c}</div>
              <div style={{fontSize:12,color:theme.textSecondary,marginTop:2}}>{getPool(c).length} questions{lvl>=30?" • Extreme":hard?" • Hard":lvl>=10?" • Mixed":""}</div></div>
            <div style={{color:CC[c],fontSize:13,fontWeight:600}}>PLAY →</div>
          </Btn>)}
        </div>
        <Btn onClick={()=>startGame("Mixed")} style={{marginTop:16,width:"100%",padding:"18px 24px",background:`linear-gradient(135deg,${theme.accent},${theme.accentAlt})`,border:"none",borderRadius:16,cursor:"pointer",fontSize:16,fontWeight:800,color:theme.bg,transition:"all .25s",animation:"fadeUp .5s ease .45s both"}}
          onMouseEnter={e=>e.currentTarget.style.transform="scale(1.02)"} onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}
        >🔀 MIXED BLITZ — All Categories</Btn>
      </div>}

      {/* ─── COUNTDOWN ─── */}
      {screen==="countdown"&&<div style={{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <div style={{fontSize:14,color:catCol,letterSpacing:3,marginBottom:20,fontWeight:600,textTransform:"uppercase"}}>{CI[cat]||"🔀"} {cat}{lvl>=30?" • EXTREME":hard?" • HARD":""}</div>
        {cd>0?<div key={cd} style={{fontFamily:"'Dela Gothic One',cursive",fontSize:120,color:catCol,animation:"countIn .6s ease",lineHeight:1,textShadow:`0 0 60px ${catCol}44`}}>{cd}</div>
        :<div style={{fontFamily:"'Dela Gothic One',cursive",fontSize:40,color:catCol,animation:"countIn .5s ease",textShadow:`0 0 40px ${catCol}44`}}>GO!</div>}
      </div>}

      {/* ─── GAME ─── */}
      {screen==="game"&&cQ&&<div style={{paddingTop:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:13,color:theme.textSecondary}}><span style={{color:catCol,fontWeight:700}}>{qi+1}</span> / {qs.length}{hard&&<span style={{marginLeft:8,fontSize:10,color:"#FF6B6B",fontWeight:700}}>{lvl>=30?"EXTREME":"HARD"}</span>}</div>
          <div style={{fontSize:15,fontWeight:800,color:theme.textPrimary}}>{score.toLocaleString()}<span style={{fontSize:11,color:theme.textSecondary,marginLeft:4}}>pts</span></div>
        </div>
        <div style={{display:"flex",gap:4,marginBottom:20}}>
          {qs.map((_,i)=><div key={i} style={{flex:1,height:4,borderRadius:2,background:i<qi?(ah[i]?theme.accent:"#FF4444"):i===qi?catCol+"44":theme.border,transition:"background .3s"}}/>)}
        </div>
        <div style={{position:"relative",marginBottom:24}}>
          <div style={{height:6,background:theme.border,borderRadius:3,overflow:"hidden"}}>
            <div style={{height:"100%",borderRadius:3,width:`${(tl/tpq)*100}%`,background:tl<=3?"linear-gradient(90deg,#FF4444,#FF6B6B)":`linear-gradient(90deg,${catCol},${catCol}88)`,transition:"width 1s linear,background .3s",...(tl<=3?{animation:"timerPulse .5s ease infinite"}:{})}}/>
          </div>
          <div style={{position:"absolute",right:0,top:-24,fontSize:18,fontWeight:800,color:tl<=3?"#FF4444":catCol,fontFamily:"'Dela Gothic One',cursive",...(tl<=3?{animation:"pulse .5s ease infinite"}:{})}}>{tl}s</div>
        </div>
        {stk>0&&<div key={stk} style={{display:"flex",justifyContent:"center",marginBottom:16,animation:"streakPop .4s ease"}}>
          <div style={{background:mult>=3?"linear-gradient(135deg,#FF6B6B22,#FFE66D22)":mult>=2?catCol+"15":theme.border,border:`1px solid ${mult>=3?"#FFE66D44":mult>=2?catCol+"33":theme.border}`,borderRadius:20,padding:"6px 16px",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:14}}>🔥</span><span style={{fontSize:13,fontWeight:700,color:mult>=3?"#FFE66D":catCol}}>{stk} streak</span>
            {mult>1&&<span style={{fontSize:12,fontWeight:800,background:mult>=3?"#FFE66D":catCol,color:theme.bg,borderRadius:8,padding:"2px 8px"}}>×{mult}</span>}
          </div>
        </div>}
        <div style={{animation:"scaleIn .35s ease",background:`linear-gradient(135deg,${theme.cardBg}F8,${theme.cardBg}EE)`,backdropFilter:'blur(8px)',borderRadius:20,padding:"28px 24px",border:`1px solid ${theme.border}`,marginBottom:20,boxShadow:`0 0 30px ${catCol}11,inset 0 1px 0 ${theme.textPrimary}08`}}>
          <div style={{fontSize:18,fontWeight:700,lineHeight:1.5,color:theme.textPrimary,textAlign:"center"}}>{cQ.q}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {cQ.opts.map((opt,i)=>{
            const isCA=i===cQ.a,isSel=sel===i,wasW=sr&&isSel&&!isCA,shC=sr&&isCA;
            const lb=["A","B","C","D"];
            let bg=`linear-gradient(135deg,${theme.cardBg}F0,${theme.cardBg}DD)`,bd=theme.border,tc=theme.textPrimary,an="";
            if(shC){bg=theme.accent+"20";bd=theme.accent+"55";tc=theme.accent;}
            if(wasW){bg="#FF444420";bd="#FF444455";tc="#FF6B6B";an="shake .5s ease";}
            return <button key={i} onClick={()=>handleAns(i)} disabled={sr} style={{background:bg,backdropFilter:'blur(12px)',border:`1.5px solid ${bd}`,borderRadius:14,padding:"16px 20px",cursor:sr?"default":"pointer",display:"flex",alignItems:"center",gap:14,fontFamily:"'Outfit',sans-serif",fontSize:15,color:tc,transition:"all .2s",animation:an||`fadeUp .3s ease ${i*.06}s both`,width:"100%",textAlign:"left",fontWeight:500,boxShadow:`0 2px 12px ${theme.bg}88`}}
              onMouseEnter={e=>{if(!sr){sfx.init();sfx.hover();e.currentTarget.style.borderColor=catCol+"55";e.currentTarget.style.background=`linear-gradient(135deg,${theme.cardHover}F5,${theme.cardHover}EE)`;e.currentTarget.style.boxShadow=`0 4px 20px ${catCol}15`;}}}
              onMouseLeave={e=>{if(!sr){e.currentTarget.style.borderColor=theme.border;e.currentTarget.style.background=`linear-gradient(135deg,${theme.cardBg}F0,${theme.cardBg}DD)`;e.currentTarget.style.boxShadow=`0 2px 12px ${theme.bg}88`;}}}>
              <div style={{width:32,height:32,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0,background:shC?theme.accent+"22":wasW?"#FF444422":theme.border,color:shC?theme.accent:wasW?"#FF6B6B":theme.textSecondary}}>
                {shC?"✓":wasW?"✗":lb[i]}
              </div><span>{opt}</span>
            </button>;
          })}
        </div>
        {pp&&<div key={score} style={{position:"fixed",top:"36%",left:"50%",transform:"translateX(-50%)",animation:"slideDown .4s ease,fadeUp .3s ease 1s reverse forwards",textAlign:"center",pointerEvents:"none",zIndex:50}}>
          <div style={{fontFamily:"'Dela Gothic One',cursive",fontSize:36,color:catCol,textShadow:`0 0 30px ${catCol}66`}}>+{pp.pts}</div>
          {pp.mult>1&&<div style={{fontSize:14,color:"#FFE66D",fontWeight:700,marginTop:4}}>×{pp.mult} MULTIPLIER</div>}
        </div>}
      </div>}

      {/* ─── RESULT ─── */}
      {screen==="result"&&<div style={{paddingTop:48,paddingBottom:40,animation:"fadeUp .6s ease"}}>
        {cor>=7&&[...Array(8)].map((_,i)=><div key={i} style={{position:"fixed",left:`${10+i*12}%`,top:-20,width:8,height:8,borderRadius:i%2===0?"50%":"1px",background:[catCol,"#FFE66D","#FF6B6B","#7B68EE","#00B4D8"][i%5],animation:`confetti ${2+Math.random()}s ease ${Math.random()*.5}s forwards`,pointerEvents:"none",zIndex:0}}/>)}
        <div style={{textAlign:"center",position:"relative",zIndex:1}}>
          <div style={{fontSize:14,color:theme.textSecondary,letterSpacing:3,textTransform:"uppercase",marginBottom:8}}>Final Score</div>
          <div style={{fontFamily:"'Dela Gothic One',cursive",fontSize:64,lineHeight:1,background:`linear-gradient(135deg,${theme.textPrimary},${catCol})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:8}}>{score.toLocaleString()}</div>
          {score>=hs&&tp>1&&<div style={{display:"inline-block",background:"#FFE66D15",border:"1px solid #FFE66D33",borderRadius:20,padding:"4px 16px",fontSize:13,color:"#FFE66D",fontWeight:700,animation:"pulse 1.5s ease infinite",marginBottom:8}}>👑 NEW HIGH SCORE!</div>}
          {cor===QPR&&cat!=='Mixed'&&<div style={{display:"inline-block",background:`${catCol}15`,border:`1px solid ${catCol}44`,borderRadius:20,padding:"4px 16px",fontSize:13,color:catCol,fontWeight:700,marginBottom:8,marginLeft:8}}>⚡ PERFECT 10!</div>}
          <div style={{fontSize:14,color:theme.textSecondary,marginBottom:24}}>{CI[cat]||"🔀"} {cat}{lvl>=30?" • Extreme":hard?" • Hard":""}</div>

          <div style={{background:theme.cardBg,borderRadius:14,padding:"16px 20px",marginBottom:16,border:`1px solid ${theme.border}`,animation:"fadeUp .4s ease .15s both"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontSize:13,color:theme.textSecondary}}>Level {lvl} — {lt}</span>
              <span style={{fontSize:14,fontWeight:800,color:theme.accent}}>+{xpg} XP</span>
            </div>
            <div style={{height:6,background:theme.border,borderRadius:3,overflow:"hidden"}}>
              <div style={{width:`${(xp/xpFor(lvl))*100}%`,height:"100%",borderRadius:3,background:`linear-gradient(90deg,${theme.accent},${theme.accentAlt})`,animation:"xpFill 1s ease"}}/>
            </div>
            <div style={{fontSize:11,color:theme.textSecondary,marginTop:4}}>{xp}/{xpFor(lvl)} XP to next level</div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
            {[{l:"Correct",v:`${cor}/${qs.length}`,c:theme.accent},{l:"Accuracy",v:`${Math.round((cor/qs.length)*100)}%`,c:catCol},{l:"Best Streak",v:bstk,c:"#FFE66D"},{l:"Top Mult",v:`×${bstk>=5?3:bstk>=3?2:1}`,c:"#7B68EE"}].map((s,i)=>
              <div key={i} style={{background:theme.cardBg,border:`1px solid ${theme.border}`,borderRadius:14,padding:"18px 14px",animation:`fadeUp .4s ease ${.2+i*.06}s both`}}>
                <div style={{fontSize:24,fontWeight:800,color:s.c,fontFamily:"'Dela Gothic One',cursive"}}>{s.v}</div>
                <div style={{fontSize:11,color:theme.textSecondary,marginTop:4,textTransform:"uppercase",letterSpacing:1}}>{s.l}</div>
              </div>)}
          </div>
          <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:24,animation:"fadeUp .5s ease .45s both"}}>
            {ah.map((c,i)=><div key={i} style={{width:28,height:28,borderRadius:8,background:c?theme.accent+"18":"#FF444418",border:`1px solid ${c?theme.accent+"33":"#FF444433"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:c?theme.accent:"#FF6B6B",fontWeight:700}}>{c?"✓":"✗"}</div>)}
          </div>
          <div style={{fontSize:15,color:theme.textSecondary,marginBottom:28,lineHeight:1.6,animation:"fadeUp .5s ease .5s both"}}>
            {cor===QPR?"🏆 PERFECT! Absolute mastery!":cor>=9?"🏆 Incredible! You crushed it!":cor>=7?"🎉 Great job! You know your stuff!":cor>=5?"👍 Not bad! Keep levelling up!":"💪 Every game earns XP — keep going!"}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10,animation:"fadeUp .5s ease .55s both"}}>
            <Btn onClick={()=>startGame(cat)} style={{width:"100%",padding:"16px 24px",background:`linear-gradient(135deg,${catCol},${catCol}CC)`,border:"none",borderRadius:14,cursor:"pointer",fontSize:16,fontWeight:800,color:theme.bg,transition:"transform .2s"}}
              onMouseEnter={e=>e.currentTarget.style.transform="scale(1.02)"} onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}
            >Play Again — {cat}</Btn>
            <Btn onClick={()=>{setScreen("menu");setShop(false);}} style={{width:"100%",padding:"16px 24px",background:theme.cardBg,border:`1px solid ${theme.border}`,borderRadius:14,cursor:"pointer",fontSize:15,fontWeight:600,color:theme.textSecondary,transition:"all .2s"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=theme.textSecondary;e.currentTarget.style.color=theme.textPrimary;}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor=theme.border;e.currentTarget.style.color=theme.textSecondary;}}
            >← Back to Categories</Btn>
            <Btn onClick={()=>{
              const txt=`🧠 Quiz Blitz v3 — I scored ${score.toLocaleString()} pts! Level ${lvl} ${lt}. Can you beat me? ${window.location.href}`;
              if(navigator.share){navigator.share({title:"Quiz Blitz",text:txt,url:window.location.href}).catch(()=>{})}
              else{navigator.clipboard.writeText(txt).then(()=>alert("Score copied! Share it 🎉")).catch(()=>{})}
            }} style={{width:"100%",padding:"14px 24px",background:"transparent",border:`1px dashed ${theme.border}`,borderRadius:14,cursor:"pointer",fontSize:14,fontWeight:600,color:theme.textSecondary,transition:"all .2s"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=theme.accent;e.currentTarget.style.color=theme.accent;}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor=theme.border;e.currentTarget.style.color=theme.textSecondary;}}
            >📤 Share Score</Btn>
          </div>
        </div>
      </div>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("/sw.js").catch(()=>{})});}
</script>
</body>
</html>
